<svg width="860" height="250" viewBox="0 0 860 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">GitHub KPI dashboard</title>
<desc id="desc">All-time contributions, repositories, stars, forks, followers, public repositories, and update date.</desc>
<style>
  .bg { fill: #0d1117; stroke: #30363d; }
  .card { fill: #161b22; stroke: #30363d; }
  .label {
    fill: #8b949e;
    font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    letter-spacing: .08em;
  }
  .value {
    fill: #f0f6fc;
    font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .meta {
    fill: #8b949e;
    font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .blue { fill: #58a6ff; }
  .purple { fill: #a371f7; }
  .green { fill: #3fb950; }
  .orange { fill: #f78166; }
  .pink { fill: #db61a2; }
  .yellow { fill: #d29922; }
</style>
<rect class="bg" x="0.5" y="0.5" width="859" height="249" rx="12"/>
<rect class="card" x="24" y="24" width="254" height="82" rx="10"/>
<rect class="card" x="303" y="24" width="254" height="82" rx="10"/>
<rect class="card" x="582" y="24" width="254" height="82" rx="10"/>
<rect class="card" x="24" y="132" width="254" height="82" rx="10"/>
<rect class="card" x="303" y="132" width="254" height="82" rx="10"/>
<rect class="card" x="582" y="132" width="254" height="82" rx="10"/>

<circle class="blue" cx="52" cy="49" r="6"/>
<text class="label" x="68" y="54">CONTRIBUTIONS</text>
<text class="value" x="50" y="91">5,285</text>

<circle class="purple" cx="331" cy="49" r="6"/>
<text class="label" x="347" y="54">CONTRIBUTION REPOS</text>
<text class="value" x="329" y="91">69</text>

<circle class="green" cx="610" cy="49" r="6"/>
<text class="label" x="626" y="54">STARS</text>
<text class="value" x="608" y="91">9</text>

<circle class="orange" cx="52" cy="157" r="6"/>
<text class="label" x="68" y="162">FORKS</text>
<text class="value" x="50" y="199">13</text>

<circle class="pink" cx="331" cy="157" r="6"/>
<text class="label" x="347" y="162">FOLLOWERS</text>
<text class="value" x="329" y="199">18</text>

<circle class="yellow" cx="610" cy="157" r="6"/>
<text class="label" x="626" y="162">PUBLIC REPOS</text>
<text class="value" x="608" y="199">64</text>

<text class="meta" x="24" y="233">updated 2026-05-22</text>
</svg>
